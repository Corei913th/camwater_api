name: CAMWATER_CI_CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    name: 🛡️ Security Audit & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Composer Audit
        run: composer audit --abandoned=ignore
      - name: Larastan SAST
        run: ./vendor/bin/phpstan analyse --error-format=github --memory-limit=1G

  iac:
    name: 🛡️ IaC & Docker Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  lint:
    name: 🧹 Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: PHP Pint
        run: ./vendor/bin/pint --test

  tests:
    name: 🧪 Feature & Unit Tests
    needs: [security, lint, iac]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.DB_DATABASE || 'camwater_db_test' }}
          POSTGRES_USER: ${{ secrets.DB_USERNAME || 'user' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, bcmath
          coverage: none
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Generate Key
        run: php artisan key:generate
      - name: Directory Permissions
        run: chmod -R 775 storage bootstrap/cache

      - name: Run Migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ secrets.DB_DATABASE || 'camwater_db_test' }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || 'user' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
        run: php artisan migrate --force

      - name: Seed Database
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ secrets.DB_DATABASE || 'camwater_db_test' }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || 'user' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
        run: php artisan db:seed --force

      - name: Run Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ secrets.DB_DATABASE || 'camwater_db_test' }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || 'user' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
        run: php artisan test



  cd:
    name: Continuous Deployment (Docker Hub)
    needs: [security, lint, iac, tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:latest,${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:${{ github.sha }}
