name: 🚛 CD - Staging

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    name: 🚀 Deploy to VPS (Port 3001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:develop,${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:${{ github.sha }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /apps/camwater-staging
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:develop
            docker compose up -d
