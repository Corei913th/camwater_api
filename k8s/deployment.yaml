apiVersion: apps/v1
kind: Deployment
metadata:
  name: camwater-app
  namespace: camwater
spec:
  replicas: 2
  selector:
    matchLabels:
      app: camwater-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: camwater-app
    spec:
      containers:
      - name: app
        image: ${DOCKERHUB_USERNAME}/laravel-app:latest
        ports:
        - containerPort: 9000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - secretRef:
            name: camwater-secrets
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: camwater-service
  namespace: camwater
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: camwater-app
