apiVersion: apps/v1
kind: Deployment
metadata:
  name: camwater-app
  namespace: camwater
spec:
  replicas: 2
  selector:
    matchLabels:
      app: camwater-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: camwater-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: ${DOCKERHUB_USERNAME}/laravel-app:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 9000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - secretRef:
            name: camwater-secrets
        volumeMounts:
        - name: storage
          mountPath: /var/www/storage
        - name: cache
          mountPath: /var/www/bootstrap/cache
        - name: tmp
          mountPath: /tmp
      - name: nginx
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: storage
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: camwater-service
  namespace: camwater
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: camwater-app
