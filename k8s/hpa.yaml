apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: camwater-hpa
  namespace: camwater
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: camwater-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
