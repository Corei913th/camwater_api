groups:
  - name: camwater_alerts
    rules:
      # 1. Alerte si le taux d'erreur 5xx dépasse 5%
      - alert: HighErrorRate
        expr: (sum(rate(nginx_http_requests_total{status=~"5.."}[5m])) / sum(rate(nginx_http_requests_total[5m]))) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreur élevé sur CamwaterPRO"
          description: "Le taux d'erreur 5xx est de {{ $value | printf \"%.2f\" }}% depuis plus de 2 minutes."

      # 2. Alerte si la base de données est injoignable
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Base de données Camwater DOWN"
          description: "L'instance PostgreSQL est injoignable pour le service monitoring."

      # 3. Alerte si le service App (Laravel) ne répond plus
      - alert: AppServiceDown
        expr: up{job="camwater-business"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API CamwaterPRO DOWN"
          description: "Le service Laravel (app) ne répond plus aux requêtes de métriques."

      # 4. Alerte si la RAM est saturée (> 90%)
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire saturée sur le serveur"
          description: "L'utilisation de la RAM est de {{ $value | printf \"%.2f\" }}%."
